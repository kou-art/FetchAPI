<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>会議室予約システム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<h2 class="mb-3">会議室 予約状況</h2>
<body class="container mt-4">

    <div class="row g-4">
        <div class="col-md-8">
            <div class="card mb-3 card-body">
                <label class="form-label">表示する日付を選択</label>
                <input type="date" id="display-date" class="form-control" onchange="filterDisplay()">
            </div>
            <table class="table table-bordered table-striped">
                <thead class="table-light">
                    <tr>
                        <th>日付</th>
                        <th>会議室名</th>
                        <th>時間（予約枠）</th>
                        <th>予約者名</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="reservation-list"></tbody>
            </table>
            <div id="message-area"></div>
        </div>
        <div class="col-md-4">
            <div class="card card-body">
                <h3 class="card-title mb-3">新規予約</h3>
                <form id="booking-form">
                    <div class="mb-3">
                        <label class="form-label">利用日</label>
                        <input type="date" id="bookingDate" class="form-control" max="9999-12-31" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">会議室名</label>
                        <select id="roomName" class="form-select">
                            <option value="会議室A">会議室A</option>
                            <option value="会議室B">会議室B</option>
                            <option value="会議室C">会議室C</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">開始時間</label>
                        <select id="startHour" class="form-select"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">利用時間</label>
                        <select id="duration" class="form-select">
                            <option value="1">1時間</option>
                            <option value="2">2時間</option>
                            <option value="3">3時間</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">予約者名</label>
                        <input type="text" id="reservedBy" class="form-control" placeholder="予約者名" required>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        予約する
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
    <script src="./script.js"></script>
</body>
</html>
